<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Rock Paper Scissor Game</h1>

    <div class="choices">
      <div id="rock" class="choice">
        <img src="imgs\rock.png" alt="Rock" />
      </div>

      <div id="paper" class="choice">
        <img src="imgs/paper.png" alt="Paper">
      </div>

      <div id="scissor" class="choice">
        <img src="imgs/scissors.png" alt="Scissor">
      </div>
    </div>

    <div class="score-board">
         <div class="score">
          <p id="user-score">0</p>
          <p class="p">You</p>
         </div>
         <div class="score">
          <div id="comp-score">0</div>
          <p class="p">Comp</p>
         </div>
    </div>

    <div class="msg-container">
      <p id="msg">Play Your Game</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
