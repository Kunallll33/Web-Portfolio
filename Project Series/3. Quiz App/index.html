<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="container" id="box1">
            <h2 id="queBox">a) This is a dome question.</h2>
            <div class="row">
                <input type="radio" id="option1" class="options" name="options" value="a">
                <label for="option1">a) option 1</label>
            </div>
            <div class="row">
                <input type="radio" id="option2" class="options" name="options" value="b">
                <label for="option2">b) option 2</label>
            </div>
            <div class="row">
                <input type="radio" id="option3" class="options" name="options" value="c">
                <label for="option3" >c) option 3</label>
            </div>
            <div class="row">
                <input type="radio" id="option4" class="options" value="d" name="options">
                <label for="option4">d) option 4</label>
            </div>

            <div class="summitBtn" onclick="summitQuiz()">
                <button class="btn">Submit</button>
            </div>
            
        </div>
    </main>

    <script src=" app.js"></script>
</body>
</html>
