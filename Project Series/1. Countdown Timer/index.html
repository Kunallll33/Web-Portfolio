<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <link rel="stylesheet" href="style.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');</style>

</head>

<body>
    <div class="main">
        <div class="overlay">
            <div class="textualContent">
                <h1>Countdown Timer</h1>
                <input type="text" class="user-input" placeholder="Enter date">
                <h2 id="end-time">2 March, 2026 6:32 PM</h2>
            </div>

            <div class="timeBox">
                <div class="inputBox">
                <input type="text" readonly value="0">
                <br>
                <label for="">Days</label>
                </div>

                <div class="inputBox">
                <input type="text" readonly value="0">
                <br>
                <label for="">Hours</label>
                </div>

                <div class="inputBox">
                <input type="text" readonly value="0">
                <br>
                <label for="">Minutes</label>
                </div>

                <div class="inputBox">
                <input type="text" readonly value="0">
                <br>
                <label for="">Secs</label>
                </div>
            </div>

            <div class="brand">
                <h4>Created By The Kunal Sharma</h4>
            </div>

        </div>

    </div>
    <script src="app.js"></script>
</body>

</html>
